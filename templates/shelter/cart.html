{% extends "base.html" %}

{%block content %}

<h2> My Adoption Cart </h2>

{% if cart_items %}
    <ul>
        {% for item in cart_items %}
            <li>
                <strong> {{ item.pet.name }} </strong> - {{ item.pet.category.name }}

                <a href="{% url 'shelter:remove_from_cart' item.id %}">
                    Remove
                </a>
            </li>
        {% endfor %}
    </ul>

    <a href="{% url 'shelter:submit_cart' %}">
        Submit Adoption Request
    </a>
{% else %}
    <p> Your cart is empty. </p>
{% endif %}

{% endblock %}

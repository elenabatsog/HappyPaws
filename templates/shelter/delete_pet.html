{% extends "base.html" %}

{% block title %}
{{ page_title }} | HappyPaws 
{% endblock %}

{%block content %}
<main class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm p-4">
                    <h1> Delete Animal </h1>

                    <p> Are you sure you want to delete 
                        <strong> {{ pet.name }} </strong>
                    </p>

                    <p class="text-danger">
                        This action cannot be undone.
                    </p>

                    <form method="POST">
                        {% csrf_token %}
                            <button type="submit" class="btn btn-danger">
                                Yes, Delete
                            </button>

                            <a href="{% url 'shelter:manage_animals' %}" class="btn btn-outline-secondary">
                                Cancel
                            </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

{% endblock %}
